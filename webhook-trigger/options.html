<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Webhook Trigger Settings</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      max-width: 480px;
      margin: 40px auto;
      padding: 0 20px;
      color: #333;
    }
    h2 {
      margin-bottom: 24px;
      font-size: 20px;
    }
    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 6px;
      margin-top: 16px;
    }
    input {
      width: 100%;
      padding: 8px 10px;
      font-size: 14px;
      border: 1px solid #ccc;
      border-radius: 6px;
      box-sizing: border-box;
    }
    input:focus {
      outline: none;
      border-color: #1a73e8;
    }
    button {
      margin-top: 24px;
      padding: 9px 20px;
      background: #1a73e8;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
    }
    button:hover {
      background: #1558b0;
    }
    #status {
      margin-top: 12px;
      font-size: 13px;
      color: green;
      min-height: 18px;
    }
    .hint {
      font-size: 12px;
      color: #888;
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <h2>Webhook Trigger Settings</h2>

  <label for="webhookUrl">Webhook URL</label>
  <input type="text" id="webhookUrl" placeholder="https://hooks.example.com/trigger/..." />
  <p class="hint">A GET request will be sent to this URL on each button click</p>

  <button id="save">Save</button>
  <div id="status"></div>

  <script src="options.js"></script>
</body>
</html>
