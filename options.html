<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Image Downloader Settings</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      max-width: 480px;
      margin: 40px auto;
      padding: 0 20px;
      color: #333;
    }
    h2 {
      margin-bottom: 24px;
      font-size: 20px;
    }
    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 6px;
      margin-top: 16px;
    }
    input {
      width: 100%;
      padding: 8px 10px;
      font-size: 14px;
      border: 1px solid #ccc;
      border-radius: 6px;
      box-sizing: border-box;
    }
    input:focus {
      outline: none;
      border-color: #1a73e8;
    }
    button {
      margin-top: 24px;
      padding: 9px 20px;
      background: #1a73e8;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
    }
    button:hover {
      background: #1558b0;
    }
    #status {
      margin-top: 12px;
      font-size: 13px;
      color: green;
      min-height: 18px;
    }
    .hint {
      font-size: 12px;
      color: #888;
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <h2>Image Downloader Settings</h2>

  <label for="serverUrl">Server URL</label>
  <input type="text" id="serverUrl" placeholder="http://10.0.30.20:3000" />
  <p class="hint">The address of your backend server</p>

  <label for="apiKey">API Key</label>
  <input type="password" id="apiKey" placeholder="Enter your API key" />
  <p class="hint">Must match the key set on the server</p>

  <button id="save">Save Settings</button>
  <div id="status"></div>

  <script src="options.js"></script>
</body>
</html>
